# Canary service routes to BOTH stable and canary pods via the shared 'app' label.
# Traffic ratio is controlled by replica counts (9:1 = 90%/10%).
# To promote canary: scale stable to 0 and canary to 10, then update stable image.
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-canary-svc
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    strategy: canary
spec:
  type: NodePort
  selector:
    app: aceest-fitness   # matches both stable and canary pods
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30082
