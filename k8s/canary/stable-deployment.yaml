apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    track: stable
    version: "2.0.0"
spec:
  replicas: 9   # 90% of traffic (9 out of 10 total pods)
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
        version: "2.0.0"
    spec:
      containers:
        - name: aceest-fitness
          image: raviranjan/aceest-fitness:2.0.0
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
