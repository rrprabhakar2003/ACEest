apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-svc
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    strategy: rolling-update
spec:
  type: NodePort
  selector:
    app: aceest-fitness
  ports:
    - name: http
      protocol: TCP
      port: 5001
      targetPort: 5001
      nodePort: 30080
