# Switch traffic between blue and green by changing the 'slot' selector.
# To switch to green: kubectl patch svc aceest-fitness-bg-svc
#   -p '{"spec":{"selector":{"slot":"green"}}}'
# To rollback to blue: kubectl patch svc aceest-fitness-bg-svc
#   -p '{"spec":{"selector":{"slot":"blue"}}}'
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-bg-svc
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    strategy: blue-green
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    slot: blue   # Change to 'green' to cut over to new version
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30081
