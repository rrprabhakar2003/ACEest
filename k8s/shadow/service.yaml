apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-production-svc
  namespace: aceest-fitness
  labels:
    strategy: shadow
    role: production
spec:
  type: NodePort
  selector:
    app: aceest-fitness
    role: production
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30083
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-shadow-svc
  namespace: aceest-fitness
  labels:
    strategy: shadow
    role: shadow
spec:
  type: ClusterIP
  selector:
    app: aceest-fitness
    role: shadow
  ports:
    - port: 5000
      targetPort: 5000
